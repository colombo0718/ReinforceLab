<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MQTT 快速群聊</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #1c1e21; margin-bottom: 20px; }
        #chat-box { height: 350px; border: 1px solid #e4e6eb; border-radius: 10px; overflow-y: auto; padding: 15px; margin-bottom: 15px; background: #fafafa; display: flex; flex-direction: column; }
        .room-setup { display: flex; gap: 10px; margin-bottom: 20px; }
        .input-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; transition: 0.2s; }
        input:focus { border-color: #0084ff; }
        button { padding: 8px 18px; border-radius: 20px; border: none; background: #0084ff; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #0073e6; }
        button:disabled { background: #ccc; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 18px; max-width: 80%; word-wrap: break-word; font-size: 14px; }
        .received { background: #e4e6eb; color: black; align-self: flex-start; }
        .sent { background: #0084ff; color: white; align-self: flex-end; }
        .sys-msg { text-align: center; font-size: 12px; color: #888; margin: 10px 0; align-self: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>極簡群聊室</h2>
    
    <div id="room-ui" class="room-setup">
        <input type="text" id="room-id" placeholder="輸入房間代碼 (如: chat123)">
        <button id="join-btn">加入/建立</button>
    </div>

    <div id="chat-ui" style="display: none;">
        <div id="chat-box"></div>
        <div class="input-group">
            <input type="text" id="msg-input" placeholder="輸入訊息...">
            <button id="send-btn">發送</button>
        </div>
    </div>
</div>

<script>
    let client;
    let currentTopic = "";
    const clientId = 'user_' + Math.random().toString(16).substr(2, 8);

    const joinBtn = document.getElementById('join-btn');
    const roomIdInput = document.getElementById('room-id');
    const chatBox = document.getElementById('chat-box');

    joinBtn.onclick = () => {
        const room = roomIdInput.value.trim();
        if (!room) return alert("請輸入房間代碼！");

        currentTopic = `universal/chat/room/${room}`;
        
        // 使用公用的 MQTT Broker (EMQX 提供)
        // wss 代表加密的 WebSocket 連線，埠號 8084 是標準公用埠
        client = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
            clientId: clientId,
            clean: true
        });

        joinBtn.disabled = true;
        joinBtn.innerText = "連線中...";

        client.on('connect', () => {
            document.getElementById('room-ui').style.display = 'none';
            document.getElementById('chat-ui').style.display = 'block';
            client.subscribe(currentTopic);
            appendMessage("系統", "已成功進入房間：" + room, 'sys-msg');
        });

        client.on('message', (topic, message) => {
            const data = JSON.parse(message.toString());
            // 只有收到別人的訊息才顯示（排除自己發出的）
            if (data.sender !== clientId) {
                appendMessage("他人", data.text, 'received');
            }
        });

        client.on('error', (err) => {
            console.error(err);
            alert("連線失敗，請重新整理頁面。");
        });
    };

    function sendMessage() {
        const input = document.getElementById('msg-input');
        const text = input.value.trim();
        if (text && client && client.connected) {
            const payload = { sender: clientId, text: text };
            client.publish(currentTopic, JSON.stringify(payload));
            appendMessage("我", text, 'sent');
            input.value = "";
        }
    }

    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('msg-input').onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    function appendMessage(sender, text, type) {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${type}`;
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>

</body>
</html>
